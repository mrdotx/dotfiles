; author: klassiker [mrdotx]
; url:    https://github.com/mrdotx/dotfiles
; date:   2026-03-08T05:22:25+0100

[module/ipc]
    type = custom/ipc
    format = <output>

[module/services]
    inherit = module/ipc
    hook-0 = polybar_services.sh --status
    initial = 1
    click-left = #services.hook.0

[module/packages]
    inherit = module/ipc
    hook-0 = polybar_pacman.sh --pacman
    initial = 1
    click-left = #packages.hook.0

[module/trash]
    inherit = module/ipc
    hook-0 = polybar_trash-cli.sh
    initial = 1
    click-left = #trash.hook.0

[module/rss]
    inherit = module/ipc
    hook-0 = polybar_freshrss.sh
    initial = 1
    click-left = #rss.hook.0

[module/music]
    inherit = module/ipc
    hook-0 =
    hook-1 = polybar_music.sh --status
    initial = 2
    click-left = cmus-remote -u
    click-middle = cmus-remote -r
    click-right = cmus-remote -n

[module/weather]
    inherit = module/ipc
    hook-0 = polybar_openweather.sh
    initial = 1
    click-left = #weather.hook.0
    click-right = polybar_openweather.sh --notify
